<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>換匯助手</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1A5CFF;--blue-l:#EEF3FF;--blue-d:#0D3DB3;
  --green:#00C27C;--green-l:#E6FAF3;
  --orange:#FF6B35;--orange-l:#FFF1EB;
  --red:#EF4444;--red-l:#FEF2F2;
  --dark:#0F1923;--mid:#526070;--light:#8899A9;
  --bg:#F7F9FC;--white:#fff;--border:#DDE3EA;
  --rs:10px;--rm:16px;--rl:22px;
  --ss:0 2px 10px rgba(15,25,35,.07);
  --sm:0 6px 24px rgba(15,25,35,.11);
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh}

/* ── STEP BAR ── */
.steps-bar{background:var(--white);border-bottom:1px solid var(--border);padding:14px 20px;position:sticky;top:0;z-index:100}
.steps-inner{max-width:560px;margin:0 auto;display:flex;align-items:center}
.step-item{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.sc{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;font-size:.75rem;font-weight:900;flex-shrink:0;transition:.3s}
.sc.done{background:var(--green);color:#fff}
.sc.active{background:var(--blue);color:#fff;box-shadow:0 0 0 4px var(--blue-l)}
.sc.idle{background:var(--border);color:var(--light)}
.sl{font-size:.78rem;font-weight:600;color:var(--mid);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sl.active{color:var(--blue)}.sl.done{color:var(--green)}
.sline{flex:1;height:2px;background:var(--border);margin:0 6px;transition:.3s;flex-shrink:0}
.sline.done{background:var(--green)}

/* ── STATUS BADGE ── */
.status-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:.82rem;font-weight:700}
.sb-open{background:var(--green-l);color:var(--green)}
.sb-closed{background:var(--red-l);color:var(--red)}
.sb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sb-open .sb-dot{background:var(--green);animation:pulse 2s infinite}
.sb-closed .sb-dot{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── PAGES ── */
.page{display:none;min-height:calc(100vh - 57px)}
.page.active{display:block}

/* ══════════════ STEP 1 ══════════════ */
.s1-wrap{max-width:480px;margin:0 auto;padding:28px 20px 40px}

/* 銀行營業狀態 */
.bank-status-bar{display:flex;align-items:center;justify-content:space-between;background:var(--white);border-radius:var(--rm);border:1px solid var(--border);padding:14px 18px;margin-bottom:20px}
.bsb-left{}
.bsb-time{font-size:.75rem;color:var(--mid);margin-top:3px}
.bsb-note{font-size:.7rem;color:var(--light);margin-top:2px}

/* 金額卡 */
.amount-card{background:var(--white);border-radius:var(--rl);border:1px solid var(--border);padding:22px;margin-bottom:14px;box-shadow:var(--ss)}
.ac-label{font-size:.7rem;font-weight:700;color:var(--mid);letter-spacing:.06em;margin-bottom:10px}
.amt-row{display:flex;align-items:center;gap:10px}
.amt-input{flex:1;font-size:2rem;font-weight:900;color:var(--dark);border:none;outline:none;background:transparent;font-family:inherit;min-width:0;width:100%}
.amt-input::placeholder{color:var(--border)}
.cur-badge{display:flex;align-items:center;gap:7px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--rm);padding:9px 13px;cursor:pointer;transition:.15s;flex-shrink:0;font-family:inherit}
.cur-badge:hover,.cur-badge.open{border-color:var(--blue);background:var(--blue-l)}
.cb-flag{font-size:1.35rem;line-height:1}
.cb-code{font-size:.92rem;font-weight:700}
.cb-arrow{font-size:.65rem;color:var(--light);transition:.2s}
.cur-badge.open .cb-arrow{transform:rotate(180deg)}

/* picker */
.cur-picker{display:none;margin-top:12px;border-top:1px solid var(--border);padding-top:12px}
.cur-picker.open{display:block}
.cp-label{font-size:.7rem;font-weight:700;color:var(--mid);margin-bottom:8px}
.cp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.cpi{display:flex;align-items:center;gap:7px;padding:10px 11px;border-radius:var(--rm);border:1.5px solid var(--border);cursor:pointer;background:var(--white);transition:.15s;font-family:inherit}
.cpi:hover{border-color:var(--blue);background:var(--blue-l)}
.cpi.sel{border-color:var(--blue);background:var(--blue-l)}
.cpi-flag{font-size:1.1rem;line-height:1}
.cpi-code{font-size:.8rem;font-weight:700;display:block}
.cpi-name{font-size:.65rem;color:var(--mid);display:block}

/* 換成 */
.to-card{background:var(--white);border-radius:var(--rl);border:1px solid var(--border);padding:18px 22px;margin-bottom:14px;box-shadow:var(--ss)}
.to-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.toi{display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 6px;border-radius:var(--rm);border:1.5px solid var(--border);cursor:pointer;background:var(--white);transition:.15s;font-family:inherit}
.toi:hover{border-color:var(--blue);background:var(--blue-l)}
.toi.sel{border-color:var(--blue);background:var(--blue-l)}
.toi-flag{font-size:1.4rem;line-height:1}
.toi-code{font-size:.8rem;font-weight:700}
.toi-name{font-size:.63rem;color:var(--mid)}

/* 位置卡 */
.loc-card{background:var(--white);border-radius:var(--rl);border:1px solid var(--border);padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:.15s;box-shadow:var(--ss)}
.loc-card:hover{border-color:var(--blue)}
.loc-card.ok{border-color:var(--green);background:var(--green-l)}
.loc-icon{width:42px;height:42px;border-radius:11px;background:var(--blue-l);display:grid;place-items:center;font-size:1.25rem;flex-shrink:0}
.loc-card.ok .loc-icon{background:var(--green-l)}
.loc-main{font-size:.88rem;font-weight:700}
.loc-sub{font-size:.73rem;color:var(--mid);margin-top:2px}

/* 搜尋鈕 */
.go-btn{width:100%;padding:15px;background:var(--blue);color:#fff;border:none;border-radius:var(--rl);font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 16px rgba(26,92,255,.28)}
.go-btn:hover{background:var(--blue-d)}
.go-btn:active{transform:scale(.99)}
.go-btn:disabled{background:var(--border);color:var(--light);box-shadow:none;cursor:not-allowed}

/* ══════════════ STEP 2 ══════════════ */
.s2-wrap{max-width:620px;margin:0 auto;padding:20px 20px 40px}

/* 摘要 */
.summary-bar{background:var(--white);border-radius:var(--rl);border:1px solid var(--border);padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.sb-amt{font-size:1.15rem;font-weight:900}
.sb-info{font-size:.75rem;color:var(--mid);margin-top:3px}
.edit-btn{background:none;border:1.5px solid var(--border);border-radius:var(--rs);padding:7px 13px;font-size:.78rem;color:var(--mid);cursor:pointer;font-family:inherit;white-space:nowrap;transition:.15s;flex-shrink:0}
.edit-btn:hover{border-color:var(--blue);color:var(--blue)}

/* 地圖區 */
.map-section{background:var(--white);border-radius:var(--rl);border:1px solid var(--border);overflow:hidden;margin-bottom:18px;box-shadow:var(--ss)}
.map-area{position:relative;height:260px;background:linear-gradient(135deg,#dbeafe 0%,#e0f2fe 50%,#dcfce7 100%)}
.map-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(148,163,184,.25) 1px,transparent 1px),linear-gradient(90deg,rgba(148,163,184,.25) 1px,transparent 1px);background-size:32px 32px}
.road-h{position:absolute;left:0;right:0;background:#cbd5e1;opacity:.7}
.road-v{position:absolute;top:0;bottom:0;background:#cbd5e1;opacity:.7}
/* distance rings */
.ring{position:absolute;border-radius:50%;border:2px dashed;transform:translate(-50%,-50%);pointer-events:none}
.ring-1km{border-color:rgba(26,92,255,.25)}
.ring-2km{border-color:rgba(26,92,255,.15)}
/* user pin */
.user-pin{position:absolute;transform:translate(-50%,-50%);z-index:10}
.up-dot{width:16px;height:16px;background:var(--blue);border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 8px rgba(26,92,255,.18)}
/* bank pins */
.bank-pin{position:absolute;transform:translate(-50%,-100%);cursor:pointer;z-index:5;transition:.15s}
.bank-pin:hover{z-index:20}
.bp-bubble{padding:5px 9px;border-radius:7px;font-size:.7rem;font-weight:700;color:#fff;white-space:nowrap;box-shadow:var(--sm);position:relative;line-height:1.3}
.bp-bubble::after{content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);border:5px solid transparent;border-bottom:none}
.bp-rank1{background:var(--orange)}.bp-rank1::after{border-top-color:var(--orange)}
.bp-rank2{background:var(--blue)}.bp-rank2::after{border-top-color:var(--blue)}
.bp-rank3{background:#6B7280}.bp-rank3::after{border-top-color:#6B7280}
.bp-closed{background:#9CA3AF;opacity:.75}.bp-closed::after{border-top-color:#9CA3AF}
/* map legend */
.map-legend{padding:10px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--mid)}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* 結果卡 */
.rcard{background:var(--white);border-radius:var(--rl);border:1.5px solid var(--border);padding:18px;margin-bottom:10px;transition:.18s;position:relative;overflow:hidden;box-shadow:var(--ss)}
.rcard:hover{box-shadow:var(--sm);transform:translateY(-1px)}
.rcard.r1{border-color:var(--orange)}
.rank-tag{position:absolute;top:0;left:0;padding:4px 13px 4px 15px;font-size:.68rem;font-weight:900;border-radius:0 0 var(--rm) 0}
.r1 .rank-tag{background:linear-gradient(90deg,#FF6B35,#FF9500);color:#fff}
.r2 .rank-tag{background:var(--bg);color:var(--mid);border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.r3 .rank-tag,.r4 .rank-tag,.r5 .rank-tag{background:var(--bg);color:var(--light);border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.rc-top{display:flex;align-items:flex-start;gap:11px;margin-top:20px;margin-bottom:12px}
.bavatar{width:42px;height:42px;border-radius:10px;background:var(--bg);border:1px solid var(--border);display:grid;place-items:center;font-size:1.2rem;flex-shrink:0}
.binfo{flex:1;min-width:0}
.bname{font-size:.9rem;font-weight:700}
.bstatus-row{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap}
.open-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0}
.closed-dot{width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0}
.bstatus-txt{font-size:.75rem;font-weight:600}
.bdist{font-size:.72rem;color:var(--mid)}
.bright{text-align:right;flex-shrink:0}
.b-get{font-size:1.3rem;font-weight:900;color:var(--green);line-height:1}
.b-unit{font-size:.7rem;color:var(--mid);margin-top:2px}
.b-diff{font-size:.68rem;font-weight:600;margin-top:2px}
.b-diff.less{color:var(--red)}
.rc-nums{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;background:var(--bg);border-radius:var(--rm);padding:10px;margin-bottom:12px}
.nl{font-size:.66rem;color:var(--light);margin-bottom:2px}
.nv{font-size:.83rem;font-weight:700}
.nv.g{color:var(--green)}.nv.o{color:var(--orange)}
.cp-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.cp-lbl{font-size:.7rem;color:var(--mid);white-space:nowrap}
.cp-track{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.cp-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--blue),var(--green))}
.cp-num{font-size:.8rem;font-weight:900;color:var(--blue);white-space:nowrap}
.rc-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-nav{padding:11px;background:var(--blue);color:#fff;border:none;border-radius:var(--rm);font-size:.85rem;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;transition:.15s}
.btn-nav:hover{background:var(--blue-d)}
.btn-call{padding:11px;background:var(--white);color:var(--dark);border:1.5px solid var(--border);border-radius:var(--rm);font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;transition:.15s}
.btn-call:hover{border-color:var(--blue);color:var(--blue)}
.closed-overlay{position:absolute;inset:0;background:rgba(255,255,255,.55);display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:700;color:var(--red);backdrop-filter:blur(1px);border-radius:var(--rl);pointer-events:none}

/* tip */
.tip-box{background:linear-gradient(135deg,#1A5CFF,#0094FF);border-radius:var(--rm);padding:14px 18px;margin-top:4px}
.tip-box p{font-size:.82rem;color:#fff;line-height:1.65;opacity:.95}

/* ── LOADING ── */
.loading{display:none;position:fixed;inset:0;background:rgba(255,255,255,.96);z-index:500;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.loading.show{display:flex}
.spinner{width:44px;height:44px;border:4px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ls{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.li{font-size:.8rem;color:var(--light);display:flex;align-items:center;gap:8px;transition:.3s}
.li.done{color:var(--green)}.li.cur{color:var(--blue);font-weight:600}
.li-dot{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0}
.li.done .li-dot{background:var(--green)}.li.cur .li-dot{background:var(--blue)}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark);color:#fff;padding:10px 18px;border-radius:var(--rs);font-size:.82rem;font-weight:500;z-index:999;opacity:0;transition:.25s;pointer-events:none;white-space:nowrap;box-shadow:var(--sm)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ── CHAT FAB ── */
.chat-fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--blue),#0094FF);color:#fff;border:none;cursor:pointer;font-size:1.5rem;display:grid;place-items:center;box-shadow:0 4px 20px rgba(26,92,255,.35);z-index:200;transition:.25s;font-family:inherit}
.chat-fab:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(26,92,255,.45)}

/* ── CHAT PANEL ── */
.chat-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:250;opacity:0;pointer-events:none;transition:opacity .3s}
.chat-overlay.show{opacity:1;pointer-events:auto}
.chat-panel{position:fixed;bottom:0;right:0;width:100%;max-width:420px;height:85vh;max-height:700px;background:var(--bg);border-radius:var(--rl) var(--rl) 0 0;box-shadow:0 -4px 30px rgba(0,0,0,.15);z-index:300;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);overflow:hidden}
.chat-panel.open{transform:translateY(0)}
.chat-header{background:linear-gradient(135deg,var(--blue),#0094FF);color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ch-title{font-size:1rem;font-weight:700;display:flex;align-items:center;gap:8px}
.ch-sub{font-size:.7rem;opacity:.75;margin-top:2px}
.ch-close{background:rgba(255,255,255,.2);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1.1rem;display:grid;place-items:center;transition:.15s}
.ch-close:hover{background:rgba(255,255,255,.35)}

/* ── CHAT MESSAGES ── */
.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.chat-msgs::-webkit-scrollbar{width:4px}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.chat-msg{max-width:85%;animation:msgIn .3s ease-out}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg-bot{align-self:flex-start}
.msg-user{align-self:flex-end}
.msg-bubble{padding:12px 16px;border-radius:var(--rm);font-size:.85rem;line-height:1.65;word-break:break-word}
.msg-bot .msg-bubble{background:var(--white);border:1px solid var(--border);color:var(--dark);border-bottom-left-radius:4px}
.msg-user .msg-bubble{background:var(--blue);color:#fff;border-bottom-right-radius:4px}
.msg-time{font-size:.65rem;color:var(--light);margin-top:4px;padding:0 4px}
.msg-bot .msg-time{text-align:left}
.msg-user .msg-time{text-align:right}

/* ── QUICK ACTIONS ── */
.quick-actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.qa-btn{padding:8px 14px;border-radius:20px;border:1.5px solid var(--blue);background:var(--blue-l);color:var(--blue);font-size:.78rem;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;white-space:nowrap}
.qa-btn:hover{background:var(--blue);color:#fff}

/* ── CHAT INPUT ── */
.chat-input-area{padding:12px 16px;background:var(--white);border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.chat-input{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--rm);font-size:.85rem;font-family:inherit;outline:none;transition:.15s;background:var(--bg)}
.chat-input:focus{border-color:var(--blue);background:var(--white)}
.chat-input::placeholder{color:var(--light)}
.chat-send{width:40px;height:40px;border-radius:50%;background:var(--blue);color:#fff;border:none;cursor:pointer;font-size:1rem;display:grid;place-items:center;transition:.15s;flex-shrink:0}
.chat-send:hover{background:var(--blue-d)}

/* ── QUIZ OPTIONS ── */
.quiz-opts{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.quiz-opt{padding:10px 14px;border-radius:var(--rm);border:1.5px solid var(--border);background:var(--white);font-size:.82rem;cursor:pointer;font-family:inherit;text-align:left;transition:.15s;display:flex;align-items:center;gap:8px}
.quiz-opt:hover:not(.correct):not(.wrong){border-color:var(--blue);background:var(--blue-l)}
.quiz-opt.correct{border-color:var(--green);background:var(--green-l);color:#065F46;cursor:default}
.quiz-opt.wrong{border-color:var(--red);background:var(--red-l);color:#991B1B;cursor:default}
.quiz-opt.disabled{pointer-events:none;opacity:.6}
.opt-label{width:22px;height:22px;border-radius:50%;background:var(--bg);border:1.5px solid var(--border);display:grid;place-items:center;font-size:.7rem;font-weight:700;flex-shrink:0}
.quiz-opt.correct .opt-label{background:var(--green);color:#fff;border-color:var(--green)}
.quiz-opt.wrong .opt-label{background:var(--red);color:#fff;border-color:var(--red)}

/* ── SCORE CARD ── */
.score-card{background:linear-gradient(135deg,var(--green),#00E693);border-radius:var(--rm);padding:18px;color:#fff;text-align:center;margin-top:10px}
.score-big{font-size:2.2rem;font-weight:900}
.score-sub{font-size:.8rem;opacity:.85;margin-top:4px}

/* ── QUESTION BANK CARD ── */
.qb-card{background:var(--white);border:1px solid var(--border);border-radius:var(--rm);padding:12px 14px;margin-top:6px;font-size:.82rem}
.qb-type{font-size:.68rem;font-weight:700;color:var(--blue);background:var(--blue-l);padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:6px}
.qb-q{font-weight:600;margin-bottom:4px}
.qb-a{font-size:.75rem;color:var(--mid)}
.qb-del{float:right;background:none;border:none;color:var(--light);cursor:pointer;font-size:.8rem;padding:2px 6px}
.qb-del:hover{color:var(--red)}

/* ── RESPONSIVE ── */
@media(max-width:599px){
  .s1-wrap,.s2-wrap{padding:16px 14px 36px}
  .cp-grid{grid-template-columns:repeat(2,1fr)}
  .amt-input{font-size:1.6rem}
  .rc-btns{grid-template-columns:1fr 1fr}
  .map-area{height:220px}
  .sl{display:none}
  .chat-panel{max-width:100%;height:92vh}
  .chat-fab{bottom:16px;right:16px;width:50px;height:50px;font-size:1.3rem}
}
@media(max-width:380px){
  .to-grid{grid-template-columns:repeat(2,1fr)}

// ══════════════════════════════════════════

// ══════════════════════════════════════════
//  營業時間判斷（中原標準時間 UTC+8）
// ══════════════════════════════════════════
function getBankStatus() {
  const now = new Date();
  // 轉換為 UTC+8
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  const tst = new Date(utc + 8 * 3600000);
  const day  = tst.getDay();   // 0=日, 1=一 … 6=六
  const hour = tst.getHours();
  const min  = tst.getMinutes();
  const sec  = tst.getSeconds();
  const totalMin = hour * 60 + min;
  const openMin  = 9  * 60;      // 09:00
  const closeMin = 15 * 60 + 30; // 15:30
  const isWeekday = day >= 1 && day <= 5;
  const isOpen = isWeekday && totalMin >= openMin && totalMin < closeMin;
  const pad = n => String(n).padStart(2,'0');
  const timeStr = `${pad(hour)}:${pad(min)}:${pad(sec)}`;
  const dayNames = ['日','一','二','三','四','五','六'];
  return { isOpen, timeStr, day: dayNames[day], isWeekday };
}

function updateClock() {
  const s = getBankStatus();
  const badge = document.getElementById('bankStatusBadge');
  const timeEl = document.getElementById('bankStatusTime');
  const iconEl = document.getElementById('bankStatusIcon');
  if (!badge) return;
  if (s.isOpen) {
    badge.innerHTML = `<div class="status-badge sb-open"><div class="sb-dot"></div>銀行營業中</div>`;
    iconEl.textContent = '🏦';
  } else {
    let note = '';
    if (!s.isWeekday) note = '（今日週'+s.day+'，假日公休）';
    else if (parseInt(s.timeStr) < 9) note = '（尚未開始營業）';
    else note = '（今日已結束營業）';
    badge.innerHTML = `<div class="status-badge sb-closed"><div class="sb-dot"></div>今日已關閉 ${note}</div>`;
    iconEl.textContent = '🔒';
  }
  timeEl.textContent = `現在時間（台灣）：${s.timeStr}　週${s.day}`;
}

// 每秒更新時鐘
setInterval(updateClock, 1000);

// ══════════════════════════════════════════
//  狀態
// ══════════════════════════════════════════
let fromC = 'USD', toC = 'TWD';
let hasLoc = false;
let userLat = 25.1699, userLng = 121.4416;

// ══════════════════════════════════════════
//  初始化
// ══════════════════════════════════════════
function init() {
  updateClock();
  buildFromGrid();
  buildToGrid();
  document.getElementById('amtIn').addEventListener('input', checkReady);
}

function buildFromGrid() {
  const g = document.getElementById('fromGrid');
  g.innerHTML = '';
  CURRENCIES.forEach(c => {
    const b = document.createElement('button');
    b.className = 'cpi' + (c.code===fromC?' sel':'');
    b.innerHTML = `<span class="cpi-flag">${c.flag}</span><span><span class="cpi-code">${c.code}</span><span class="cpi-name">${c.name}</span></span>`;
    b.onclick = () => selectFrom(c.code);
    g.appendChild(b);
  });
}

function buildToGrid() {
  const g = document.getElementById('toGrid');
  g.innerHTML = '';
  // 排除來源幣別，TWD 優先
  const list = [
    ...CURRENCIES.filter(c=>c.code==='TWD'&&c.code!==fromC),
    ...CURRENCIES.filter(c=>c.code!=='TWD'&&c.code!==fromC),
  ];
  list.forEach(c => {
    const b = document.createElement('button');
    b.className = 'toi' + (c.code===toC?' sel':'');
    b.innerHTML = `<span class="toi-flag">${c.flag}</span><span class="toi-code">${c.code}</span><span class="toi-name">${c.name}</span>`;
    b.onclick = () => selectTo(c.code);
    g.appendChild(b);
  });
}

function selectFrom(code) {
  fromC = code;
  const c = CURRENCIES.find(x=>x.code===code);
  document.getElementById('fromFlag').textContent = c.flag;
  document.getElementById('fromCode').textContent = c.code;
  if (toC === code) toC = code==='TWD'?'JPY':'TWD';
  closePicker();
  buildFromGrid();
  buildToGrid();
  checkReady();
}

function selectTo(code) {
  toC = code;

}

function getLocation() {
  if (hasLoc) return;
  document.getElementById('locMain').textContent = '定位中…';
  document.getElementById('locSub').textContent = '請允許瀏覽器存取位置';
  document.getElementById('locIcon').textContent = '⏳';
  if (!navigator.geolocation) { useDefault(); return; }
  navigator.geolocation.getCurrentPosition(
    pos => { userLat=pos.coords.latitude; userLng=pos.coords.longitude; locOK(); },
    () => useDefault(),
    {timeout:8000}
  );
}
function locOK() {
  hasLoc = true;
  document.getElementById('locCard').classList.add('ok');
  document.getElementById('locIcon').textContent = '✅';
  document.getElementById('locMain').textContent = '位置已取得';
  document.getElementById('locSub').textContent = `${userLat.toFixed(4)}, ${userLng.toFixed(4)}`;
  checkReady();
}
function useDefault() {
  hasLoc = true;
  document.getElementById('locCard').classList.add('ok');
  document.getElementById('locIcon').textContent = '📍';
  document.getElementById('locMain').textContent = '使用預設位置（淡水區）';
  document.getElementById('locSub').textContent = '無法取得 GPS，以淡水為基準';

function checkReady() {

function doSearch() {
  const ld = document.getElementById('loading');
  ld.classList.add('show');

  let i = 0;

    else{clearInterval(tick);setTimeout(()=>{ld.classList.remove('show');showResults()},350)}
  },550);
}

// ══════════════════════════════════════════
//  計算 & 顯示結果
// ══════════════════════════════════════════
function calcGot(bank, fromCur, toCur, amountFrom) {
  // 先把 fromCur → TWD
  let amtTWD;
  if (fromCur === 'TWD') {
    amtTWD = amountFrom;
  } else {
    const r = RATES[bank.name]?.[fromCur];
    if (!r || r.buy === 0) return null; // 此銀行無此幣別
    amtTWD = amountFrom * r.buy; // 你把外幣賣給銀行，拿到 TWD
  }

  // TWD → toCur
  let got;
  if (toCur === 'TWD') {
    got = amtTWD - bank.fee; // 直接拿 TWD，扣手續費
  } else {
    const r = RATES[bank.name]?.[toCur];
    if (!r || r.sell === 0) return null;
    got = (amtTWD - bank.fee) / r.sell; // 用 TWD 買外幣
  }
  return got > 0 ? got : null;
}

function showResults() {
  const amt   = parseFloat(document.getElementById('amtIn').value)||0;
  const fromCur = fromC, toCur = toC;
  const { isOpen } = getBankStatus();

  // 計算各家
  let results = BANKS.map(bank => {
    const got = calcGot(bank, fromCur, toCur, amt);
    if (got === null) return null;

    // 匯率顯示字串
    let rateStr;
    if (fromCur !== 'TWD' && toCur === 'TWD') {
      const r = RATES[bank.name]?.[fromCur];
      rateStr = r ? `1 ${fromCur} = ${r.buy} TWD` : '—';
    } else if (fromCur === 'TWD' && toCur !== 'TWD') {
      const r = RATES[bank.name]?.[toCur];
      rateStr = r ? `1 TWD = ${(1/r.sell).toFixed(4)} ${toCur}` : '—';
    } else {
      rateStr = '直接換算';
    }

    return {...bank, got, rateStr, bankOpen: isOpen};
  }).filter(Boolean);

  if (results.length === 0) {
    showToast('⚠️ 找不到支援此幣別的銀行');
    return;
  }

  // CP 值排序（只對營業中的排，已關閉的排後面）
  const maxGot  = Math.max(...results.map(r=>r.got));
  const minGot  = Math.min(...results.map(r=>r.got));
  const maxDist = Math.max(...results.map(r=>r.dist));
  results = results.map(r => {
    const sGot  = maxGot===minGot?1:(r.got-minGot)/(maxGot-minGot);
    const sFee  = r.fee===0?1:Math.max(0,1-r.fee/500);
    const sDist = 1-(r.dist/maxDist);
    const cp    = Math.round((sGot*0.5+sFee*0.3+sDist*0.2)*50)/10;
    return {...r, cp};
  });
  results.sort((a,b)=>{
    if(a.bankOpen!==b.bankOpen) return a.bankOpen?-1:1;
    return b.cp-a.cp;
  });

  // 摘要
  const fc = CURRENCIES.find(c=>c.code===fromCur);
  const tc = CURRENCIES.find(c=>c.code===toCur);
  document.getElementById('sumAmt').textContent = `${amt.toLocaleString()} ${fc.flag} ${fromCur} → ${tc.flag} ${toCur}`;
  document.getElementById('sumInfo').textContent = `📍 目前位置・找到 ${results.length} 家`;

  // 地圖標記
  buildMapPins(results);

  // 結果卡片
  const list = document.getElementById('resultsList');
  list.innerHTML = '';
  const best = results.find(r=>r.bankOpen) || results[0];

  results.forEach((r,idx)=>{
    const rankClass = idx===0?'r1':idx===1?'r2':idx===2?'r3':idx===3?'r4':'r5';
    const rankLabel = idx===0?'🏆 CP值最高':idx===1?'🥈 第 2 名':idx===2?'🥉 第 3 名':`#${idx+1}`;
    const gotFmt    = r.got >= 100
      ? r.got.toLocaleString('zh-TW',{maximumFractionDigits:0})
      : r.got.toFixed(4);
    const diffVal   = best.got - r.got;
    const diffStr   = idx===0?'':`少換 ${diffVal>=100?Math.round(diffVal).toLocaleString():diffVal.toFixed(4)} ${toCur}`;
    const statusTxt = r.bankOpen?'營業中':'今日已關閉';
    const statusColor = r.bankOpen?'var(--green)':'var(--red)';

    const div = document.createElement('div');
    div.className = `rcard ${rankClass}`;
    div.innerHTML = `
      <div class="rank-tag">${rankLabel}</div>
      <div class="rc-top">
        <div class="bavatar">${r.icon}</div>
        <div class="binfo">
          <div class="bname">${r.name} ${r.branch}</div>
          <div class="bstatus-row">
            <div class="${r.bankOpen?'open-dot':'closed-dot'}"></div>
            <span class="bstatus-txt" style="color:${statusColor}">${statusTxt}</span>
            <span class="bdist">・步行 ${r.walkMin} 分（${r.dist}m）</span>
          </div>
        </div>
        <div class="bright">
          <div class="b-get">${gotFmt}</div>
          <div class="b-unit">${toCur}</div>
          ${diffStr?`<div class="b-diff less">↓ ${diffStr}</div>`:''}
        </div>
      </div>
      <div class="rc-nums">
        <div><div class="nl">匯率</div><div class="nv g" style="font-size:.75rem">${r.rateStr}</div></div>
        <div><div class="nl">手續費</div><div class="nv ${r.fee===0?'g':'o'}">${r.fee===0?'免費':'$'+r.fee}</div></div>
        <div><div class="nl">距離</div><div class="nv">${r.dist}m</div></div>
      </div>
      <div class="cp-row">
        <span class="cp-lbl">CP 值</span>
        <div class="cp-track"><div class="cp-bar" style="width:${(r.cp/5*100).toFixed(0)}%"></div></div>
        <span class="cp-num">${r.cp}/5</span>
      </div>
      <div class="rc-btns">
        <button class="btn-nav" onclick="navTo('${r.name} ${r.branch}')">🗺 立即導航</button>
        <button class="btn-call" onclick="callBank('${r.phone}','${r.name}')">📞 ${r.phone}</button>
      </div>
      ${!r.bankOpen?'<div class="closed-overlay">今日已關閉，明日 09:00 開始</div>':''}
    `;
    list.appendChild(div);
  });

  // Tip
  const tip = best;
  const saving = best.got - results[results.length-1].got;
  document.getElementById('tipText').textContent =
    `💡 「${tip.name} ${tip.branch}」目前 CP 值最高，可換 ${
      tip.got>=100?tip.got.toLocaleString('zh-TW',{maximumFractionDigits:0}):tip.got.toFixed(4)
    } ${toCur}。${saving>0?`比最差選項多換 ${saving>=100?Math.round(saving).toLocaleString():saving.toFixed(4)} ${toCur}，`:''
    }步行僅需 ${tip.walkMin} 分鐘，${tip.fee===0?'且完全免手續費！':'建議先確認現鈔是否充足。'}`;

  // 更新時間
  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset()*60000;
  const tst = new Date(utc + 8*3600000);
  const pad = n=>String(n).padStart(2,'0');
  document.getElementById('mapUpdateTime').textContent =
    `資料更新：${pad(tst.getHours())}:${pad(tst.getMinutes())}`;

  setStep(3);
  showPage('s2');
}

function buildMapPins(results) {
  // 設定距離圈大小（以地圖寬度比例換算）
  const mapEl = document.getElementById('mapArea');
  const w = mapEl.offsetWidth;
  const maxDistPx = w * 0.4; // 地圖邊緣大約代表 2km
  const pxPerM = maxDistPx / 2000;
  const r1 = Math.round(1000 * pxPerM);
  const r2 = Math.round(2000 * pxPerM);
  document.getElementById('ring1km').style.cssText = `left:50%;top:50%;width:${r1*2}px;height:${r1*2}px;margin-left:-${r1}px;margin-top:-${r1}px`;
  document.getElementById('ring2km').style.cssText = `left:50%;top:50%;width:${r2*2}px;height:${r2*2}px;margin-left:-${r2}px;margin-top:-${r2}px`;

  const container = document.getElementById('mapPins');
  container.innerHTML = '';
  results.forEach((r, idx) => {
    const pin = document.createElement('div');
    pin.className = 'bank-pin';
    pin.style.left = r.pos.x + '%';
    pin.style.top  = r.pos.y + '%';
    let cls = idx===0?'bp-rank1':idx<=2?'bp-rank2':'bp-rank3';
    if (!r.bankOpen) cls = 'bp-closed';
    pin.innerHTML = `<div class="bp-bubble ${cls}" title="${r.name} ${r.branch}">${r.icon} ${r.name}</div>`;
    pin.onclick = () => showToast(`${r.name}・步行${r.walkMin}分・CP值${r.cp}`);
    container.appendChild(pin);
  });
}

function chatNow() {

  const t = new Date(n.getTime() + n.getTimezoneOffset() * 60000 + 8 * 3600000);
  return String(t.getHours()).padStart(2,'0') + ':' + String(t.getMinutes()).padStart(2,'0');
}

function escH(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function route(text) {
  if (chatState !== 'idle') { handleCreate(text); return; }
  const t = text.toLowerCase();
  if (t==='出題'||t==='create'||t==='/create'||t.includes('建立題目')||t.includes('新增題目')) startCreate();
  else if (t==='自動出題'||t==='auto'||t==='/auto'||t.includes('自動產生')) autoGen();
  else if (t==='題庫'||t==='list'||t==='/list'||t.includes('查看題目')||t.includes('所有題目')) showBank();
  else if (t==='測驗'||t==='quiz'||t==='/quiz'||t.includes('開始測驗')||t.includes('開始作答')) startQuiz();
  else if (t==='幫助'||t==='help'||t==='/help') showHelp();
  else if (t==='清除題庫'||t==='clear'||t==='/clear') clearBank();
  else addBot('🤔 不太理解這個指令，請試試以下功能：', [
    {l:'📝 出題', c:'create'}, {l:'🤖 自動出題', c:'auto'},
    {l:'📋 題庫', c:'list'}, {l:'🎯 測驗', c:'quiz'}, {l:'❓ 幫助', c:'help'}
  ]);
}

function doAction(cmd) {
  switch(cmd) {
    case 'create': addUser('出題'); setTimeout(startCreate, 300); break;
    case 'auto':   addUser('自動出題'); setTimeout(autoGen, 300); break;
    case 'list':   addUser('題庫'); setTimeout(showBank, 300); break;
    case 'quiz':   addUser('測驗'); setTimeout(startQuiz, 300); break;
    case 'help':   addUser('幫助'); setTimeout(showHelp, 300); break;
    case 'menu':   chatState='idle'; showWelcome(); break;
    case 'clear_confirm': addUser('清除題庫'); setTimeout(clearBank, 300); break;
    case 'type_mc':   handleCreate('1'); break;
    case 'type_tf':   handleCreate('2'); break;
    case 'type_fb':   handleCreate('3'); break;
    case 'ans_a':     handleCreate('A'); break;
    case 'ans_b':     handleCreate('B'); break;
    case 'ans_c':     handleCreate('C'); break;
    case 'ans_d':     handleCreate('D'); break;
    case 'tf_yes':    handleCreate('是'); break;
    case 'tf_no':     handleCreate('非'); break;
  }
}

// ── 手動出題流程 ──
function startCreate() {
  chatState = 'pick_type';
  curQ = {};
  addBot(
    '📝 <strong>開始出題！</strong><br><br>請選擇題目類型：<br>' +
    '1️⃣ 選擇題（四選一）<br>' +
    '2️⃣ 是非題<br>' +
    '3️⃣ 填空題',
    [{l:'1️⃣ 選擇題', c:'type_mc'}, {l:'2️⃣ 是非題', c:'type_tf'}, {l:'3️⃣ 填空題', c:'type_fb'}]
  );
}

function handleCreate(text) {
  const t = text.trim();
  switch(chatState) {
    case 'pick_type':
      if (t==='1'||t.includes('選擇')) { curQ.type='mc'; curQ.typeName='選擇題'; }
      else if (t==='2'||t.includes('是非')) { curQ.type='tf'; curQ.typeName='是非題'; }
      else if (t==='3'||t.includes('填空')) { curQ.type='fb'; curQ.typeName='填空題'; }
      else { addBot('請輸入 1、2 或 3 來選擇題目類型 😊'); return; }
      chatState = 'input_q';
      addBot(`✅ 已選擇：<strong>${curQ.typeName}</strong><br><br>請輸入題目內容：<br><em>例如：哪家銀行的美元買入匯率最高？</em>`);
      break;

    case 'input_q':
      curQ.question = t;
      if (curQ.type === 'mc') { chatState = 'mc_a'; addBot('請輸入<strong>選項 A</strong> 的內容：'); }
      else if (curQ.type === 'tf') {
        chatState = 'tf_ans';
        addBot('這題的正確答案是？', [{l:'⭕ 是（正確）', c:'tf_yes'}, {l:'❌ 非（錯誤）', c:'tf_no'}]);
      } else { chatState = 'fb_ans'; addBot('請輸入<strong>正確答案</strong>：<br><em>例如：台灣銀行</em>'); }
      break;

    case 'mc_a': curQ.options = [t]; chatState = 'mc_b'; addBot('請輸入<strong>選項 B</strong> 的內容：'); break;
    case 'mc_b': curQ.options.push(t); chatState = 'mc_c'; addBot('請輸入<strong>選項 C</strong> 的內容：'); break;
    case 'mc_c': curQ.options.push(t); chatState = 'mc_d'; addBot('請輸入<strong>選項 D</strong> 的內容：'); break;
    case 'mc_d':
      curQ.options.push(t);
      chatState = 'mc_ans';
      addBot(
        '哪個是正確答案？<br>A. '+escH(curQ.options[0])+'<br>B. '+escH(curQ.options[1])+'<br>C. '+escH(curQ.options[2])+'<br>D. '+escH(curQ.options[3]),
        [{l:'A', c:'ans_a'}, {l:'B', c:'ans_b'}, {l:'C', c:'ans_c'}, {l:'D', c:'ans_d'}]
      );
      break;

    case 'mc_ans': {
      const m = {a:0,b:1,c:2,d:3,A:0,B:1,C:2,D:3};
      if (m[t] === undefined) { addBot('請輸入 A、B、C 或 D 😊'); return; }
      curQ.answer = m[t];
      finishCreate();
      break;
    }

    case 'tf_ans':
      if (t==='是'||t.includes('正確')||t==='O'||t==='o'||t==='true') {
        curQ.answer = true;
      } else if (t==='非'||t.includes('錯誤')||t==='X'||t==='x'||t==='false') {
        curQ.answer = false;
      } else { addBot('請回答「是」或「非」😊'); return; }
      curQ.options = ['正確（是）','錯誤（非）'];
      finishCreate();
      break;

    case 'fb_ans':
      curQ.answer = t;
      finishCreate();
      break;
  }
}

function finishCreate() {
  curQ.id = Date.now();
  questionBank.push(curQ);
  saveBank();
  chatState = 'idle';

  let ansStr = '';
  if (curQ.type==='mc') ansStr = ['A','B','C','D'][curQ.answer] + '. ' + escH(curQ.options[curQ.answer]);
  else if (curQ.type==='tf') ansStr = curQ.answer ? '⭕ 正確' : '❌ 錯誤';
  else ansStr = escH(curQ.answer);

  addBot(
    '🎉 <strong>題目建立成功！</strong><br><br>' +
    `<div class="qb-card"><span class="qb-type">${curQ.typeName}</span>` +
    `<div class="qb-q">${escH(curQ.question)}</div>` +
    `<div class="qb-a">✅ 正確答案：${ansStr}</div></div><br>` +
    `題庫目前共有 <strong>${questionBank.length}</strong> 題`,
    [{l:'📝 繼續出題', c:'create'}, {l:'🤖 自動出題', c:'auto'}, {l:'🎯 開始測驗', c:'quiz'}, {l:'🏠 主選單', c:'menu'}]
  );
}

// ── 自動出題 ──
function autoGen() {
  const generated = [];
  const bankNames = Object.keys(RATES);
  const curCodes = Object.keys(RATES[bankNames[0]]);

  // 1) 哪家銀行的 X 買入匯率最高
  const c1 = curCodes[Math.floor(Math.random()*curCodes.length)];
  const cn1 = CURRENCIES.find(x=>x.code===c1);
  let best1 = '', bestVal1 = 0;
  bankNames.forEach(b => { const r = RATES[b][c1]; if(r&&r.buy>bestVal1){bestVal1=r.buy;best1=b;} });
  const wrongs1 = bankNames.filter(b=>b!==best1).sort(()=>Math.random()-.5).slice(0,3);
  const opts1 = [best1,...wrongs1].sort(()=>Math.random()-.5);
  generated.push({ id:Date.now(), type:'mc', typeName:'選擇題',
    question:`哪家銀行的${cn1?cn1.name:c1}（${c1}）現鈔買入匯率最高？`,
    options:opts1, answer:opts1.indexOf(best1) });

  // 2) X 銀行的 Y 賣出匯率是多少（填空）
  const b2 = bankNames[Math.floor(Math.random()*bankNames.length)];
  const c2 = curCodes.filter(cc=>RATES[b2][cc]&&RATES[b2][cc].sell>0);
  if (c2.length) {
    const cc2 = c2[Math.floor(Math.random()*c2.length)];
    const cn2 = CURRENCIES.find(x=>x.code===cc2);
    generated.push({ id:Date.now()+1, type:'fb', typeName:'填空題',
      question:`${b2}的${cn2?cn2.name:cc2}（${cc2}）現鈔賣出匯率是多少？`,
      answer: String(RATES[b2][cc2].sell) });
  }

  // 3) 是非題：距離比較
  const bi = Math.floor(Math.random()*(BANKS.length-1));
  const ba = BANKS[bi], bb = BANKS[bi+1];
  const closer = ba.dist < bb.dist;
  generated.push({ id:Date.now()+2, type:'tf', typeName:'是非題',
    question:`${ba.name}（${ba.dist}m）比${bb.name}（${bb.dist}m）距離更近`,
    options:['正確（是）','錯誤（非）'], answer:closer });

  // 4) 哪家銀行手續費為 0（選擇題）
  const freeBanks = BANKS.filter(b=>b.fee===0);
  const feeBanks = BANKS.filter(b=>b.fee>0);
  if (freeBanks.length && feeBanks.length) {
    const correct = freeBanks[Math.floor(Math.random()*freeBanks.length)].name;
    const wrong = feeBanks.map(b=>b.name).slice(0,2);
    const extra = freeBanks.filter(b=>b.name!==correct).slice(0,1).map(b=>b.name+'（也免手續費）');
    const allOpts = [correct, ...wrong];
    while(allOpts.length<4) allOpts.push(bankNames.filter(b=>!allOpts.includes(b))[0]||'無');
    const shuffled = allOpts.sort(()=>Math.random()-.5);
    generated.push({ id:Date.now()+3, type:'mc', typeName:'選擇題',
      question:'以下哪家銀行換匯免手續費？',
      options:shuffled, answer:shuffled.indexOf(correct) });
  }

  // 5) 步行時間（填空）
  const bk5 = BANKS[Math.floor(Math.random()*BANKS.length)];
  generated.push({ id:Date.now()+4, type:'fb', typeName:'填空題',
    question:`步行到${bk5.name}${bk5.branch}大約需要幾分鐘？`,
    answer: String(bk5.walkMin) });

  questionBank.push(...generated);
  saveBank();

  let preview = generated.map((q,i) =>
    `<div class="qb-card"><span class="qb-type">${q.typeName}</span><div class="qb-q">${escH(q.question)}</div></div>`
  ).join('');

  addBot(
    `🤖 已自動產生 <strong>${generated.length}</strong> 題！<br>${preview}<br>題庫目前共有 <strong>${questionBank.length}</strong> 題`,
    [{l:'🤖 再產生更多', c:'auto'}, {l:'🎯 開始測驗', c:'quiz'}, {l:'📋 查看題庫', c:'list'}, {l:'🏠 主選單', c:'menu'}]
  );
}

// ── 題庫 ──
function showBank() {
  if (!questionBank.length) {
    addBot('📋 題庫目前是空的，先來出題吧！', [{l:'📝 出題', c:'create'}, {l:'🤖 自動出題', c:'auto'}]);
    return;
  }
  let cards = questionBank.map((q,i) => {
    let ansStr = '';
    if (q.type==='mc') ansStr = ['A','B','C','D'][q.answer] + '. ' + escH(q.options[q.answer]);
    else if (q.type==='tf') ansStr = q.answer ? '⭕ 正確' : '❌ 錯誤';
    else ansStr = escH(q.answer);
    return `<div class="qb-card">
      <button class="qb-del" onclick="delQ(${i})" title="刪除">✕</button>
      <span class="qb-type">${q.typeName}</span>
      <div class="qb-q">${escH(q.question)}</div>
      <div class="qb-a">✅ ${ansStr}</div>
    </div>`;
  }).join('');
  addBot(`📋 <strong>題庫</strong>（共 ${questionBank.length} 題）${cards}`,
    [{l:'🎯 開始測驗', c:'quiz'}, {l:'📝 出題', c:'create'}, {l:'🗑️ 清除全部', c:'clear_confirm'}]);
}

function delQ(idx) {
  if (idx >= 0 && idx < questionBank.length) {
    const name = questionBank[idx].question.substring(0,15) + '...';
    questionBank.splice(idx, 1);
    saveBank();
    addBot(`🗑️ 已刪除題目：「${escH(name)}」<br>剩餘 ${questionBank.length} 題`);
  }
}

function clearBank() {
  questionBank = [];
  saveBank();
  addBot('🗑️ 題庫已全部清除！', [{l:'📝 出題', c:'create'}, {l:'🤖 自動出題', c:'auto'}, {l:'🏠 主選單', c:'menu'}]);
}

// ── 測驗 ──
function startQuiz() {
  if (questionBank.length < 2) {
    addBot(`📢 題庫至少需要 <strong>2 題</strong>才能開始測驗（目前 ${questionBank.length} 題）`, [{l:'📝 出題', c:'create'}, {l:'🤖 自動出題', c:'auto'}]);
    return;
  }
  const count = Math.min(questionBank.length, 10);
  quiz = { qs: [...questionBank].sort(()=>Math.random()-.5).slice(0,count), idx:0, score:0 };
  chatState = 'quiz';
  addBot(`🎯 <strong>測驗開始！</strong><br>共 ${quiz.qs.length} 題，加油！`);
  setTimeout(showQuizQ, 500);
}

function showQuizQ() {
  const q = quiz.qs[quiz.idx];
  const c = document.getElementById('chatMsgs');
  const d = document.createElement('div');
  d.className = 'chat-msg msg-bot';
  const labels = ['A','B','C','D'];

  let optsHtml = '';
  if (q.type === 'mc') {
    optsHtml = '<div class="quiz-opts">' + q.options.map((o,i) =>
      `<button class="quiz-opt" onclick="ansQuiz(this,${i},${q.answer},'mc')"><span class="opt-label">${labels[i]}</span>${escH(o)}</button>`
    ).join('') + '</div>';
  } else if (q.type === 'tf') {
    optsHtml = '<div class="quiz-opts">' +
      `<button class="quiz-opt" onclick="ansQuiz(this,0,${q.answer?0:1},'tf')"><span class="opt-label">⭕</span>正確（是）</button>` +
      `<button class="quiz-opt" onclick="ansQuiz(this,1,${q.answer?0:1},'tf')"><span class="opt-label">❌</span>錯誤（非）</button>` +
      '</div>';
  } else {
    optsHtml = `<div style="margin-top:8px"><input class="chat-input" style="width:100%" placeholder="輸入你的答案…" onkeydown="if(event.key==='Enter')ansFB(this,'${escH(q.answer).replace(/'/g,"\\'")}')"><button class="qa-btn" style="margin-top:6px" onclick="ansFB(this.previousElementSibling,'${escH(q.answer).replace(/'/g,"\\'")}')">確認</button></div>`;
  }

  d.innerHTML = `<div class="msg-bubble"><strong>第 ${quiz.idx+1}/${quiz.qs.length} 題</strong>　<span class="qb-type">${q.typeName}</span><br><br>${escH(q.question)}${optsHtml}</div><div class="msg-time">${chatNow()}</div>`;
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

function ansQuiz(el, picked, correct, type) {
  const parent = el.closest('.quiz-opts');
  const btns = parent.querySelectorAll('.quiz-opt');
  btns.forEach((b,i) => {
    b.style.pointerEvents = 'none';
    if (i === correct) b.classList.add('correct');
    else if (i === picked && picked !== correct) b.classList.add('wrong');
    else b.classList.add('disabled');
  });
  if (picked === correct) quiz.score++;
  setTimeout(nextQ, 1200);
}

function ansFB(inputEl, correctAns) {
  const val = inputEl.value.trim();
  if (!val) return;
  inputEl.disabled = true;
  const isCorrect = val === correctAns;
  if (isCorrect) { quiz.score++; inputEl.style.borderColor = 'var(--green)'; inputEl.style.background = 'var(--green-l)'; }
  else { inputEl.style.borderColor = 'var(--red)'; inputEl.style.background = 'var(--red-l)'; }
  addBot(isCorrect ? '✅ 答對了！' : `❌ 答錯了！正確答案是：<strong>${escH(correctAns)}</strong>`);
  setTimeout(nextQ, 1200);
}

function nextQ() {
  quiz.idx++;
  if (quiz.idx < quiz.qs.length) showQuizQ();
  else finishQuiz();
}

function finishQuiz() {
  chatState = 'idle';
  const pct = Math.round(quiz.score / quiz.qs.length * 100);
  const emoji = pct>=80?'🎉':pct>=60?'👍':'💪';
  const msg = pct>=80?'太厲害了！你對換匯知識非常熟悉！':pct>=60?'不錯喔！再多練習會更好！':'繼續加油！多了解換匯知識對你有幫助！';

  const c = document.getElementById('chatMsgs');
  const d = document.createElement('div');
  d.className = 'chat-msg msg-bot';
  d.innerHTML = `<div class="msg-bubble">
    <div class="score-card">
      <div class="score-big">${quiz.score} / ${quiz.qs.length}</div>
      <div class="score-sub">${emoji} 正確率 ${pct}%</div>
    </div>
    <div style="margin-top:10px">${msg}</div>
    <div class="quick-actions">
      <button class="qa-btn" onclick="doAction('quiz')">🔄 再測一次</button>
      <button class="qa-btn" onclick="doAction('auto')">🤖 自動出題</button>
      <button class="qa-btn" onclick="doAction('menu')">🏠 主選單</button>
    </div>
  </div><div class="msg-time">${chatNow()}</div>`;
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

init();
</script>
</body>
</html>
